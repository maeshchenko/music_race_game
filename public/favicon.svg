<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- стиль постера: ночь и два габарита, ничего мелкого -->
  <defs>
    <radialGradient id="night" cx="0.5" cy="0.42" r="0.8">
      <stop offset="0" stop-color="#15161d"/>
      <stop offset="1" stop-color="#07080b"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#night)"/>
  <!-- свечение -->
  <g filter="url(#glow)">
    <rect x="8" y="26" width="20" height="12" rx="2.5" fill="#ff3a26" opacity="0.9"/>
    <rect x="36" y="26" width="20" height="12" rx="2.5" fill="#ff3a26" opacity="0.9"/>
  </g>
  <!-- сами габариты -->
  <rect x="8" y="26" width="20" height="12" rx="2.5" fill="#ff4530"/>
  <rect x="36" y="26" width="20" height="12" rx="2.5" fill="#ff4530"/>
</svg>
