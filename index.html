    <style>
      :root {
        --sodium: #ffa54d;
        --concrete: #8a8d94;
        --bg: #14151a;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: var(--bg); color: #c9ccd2;
        font-family: "Courier New", monospace; overflow: hidden;
        overscroll-behavior: none; }
      #app { height: 100%; }
      #app > canvas { display: block; cursor: none; touch-action: none;
        -webkit-user-select: none; user-select: none; }
      .fever-edge {
        position: absolute; inset: 0; z-index: 4; pointer-events: none;
        opacity: 0; transition: opacity 0.4s;
      }
      .fever-edge.on {
        opacity: 1;
        box-shadow:
          inset 0 0 60px rgba(255, 70, 255, 0.45),
          inset 0 0 140px rgba(40, 255, 230, 0.18);
        animation: fever-pulse 0.5s ease-in-out infinite alternate;
      }
      /* fever II/III: жарче и быстрее — уровень виден (filter поверх
         анимируемого box-shadow, keyframes его не перебивают) */
      .fever-edge.on.lvl2 { filter: brightness(1.45) hue-rotate(25deg); animation-duration: 0.38s; }
      .fever-edge.on.lvl3 { filter: brightness(1.95) hue-rotate(50deg); animation-duration: 0.28s; }
      @keyframes fever-pulse {
        from { box-shadow: inset 0 0 50px rgba(255, 70, 255, 0.35), inset 0 0 120px rgba(40, 255, 230, 0.12); }
        to { box-shadow: inset 0 0 90px rgba(255, 70, 255, 0.6), inset 0 0 180px rgba(40, 255, 230, 0.28); }
      }
      .combo-bar {
        position: absolute; top: 2.4rem; left: 1.2rem; z-index: 5;
        width: 180px; height: 4px; background: rgba(255, 255, 255, 0.12);
        pointer-events: none;
      }
      .combo-bar > div {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #22ffee, #ff44ff);
        box-shadow: 0 0 8px rgba(255, 68, 255, 0.7);
        transition: width 0.15s;
      }
      /* комбо-кольцо (Beat Saber-стиль): прогресс до следующей вехи виден телом
         глаза; цвет/центр растут с fever и овердрайвом */
      .combo-ring-wrap {
        position: absolute; bottom: 6%; left: 50%; transform: translateX(-50%);
        width: 128px; height: 128px; z-index: 5; pointer-events: none;
        display: flex; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s;
      }
      .combo-ring-wrap.on { opacity: 0.95; }
      .combo-ring {
        position: absolute; inset: 0; border-radius: 50%;
        background: conic-gradient(var(--rc, #22ffee) calc(var(--rp, 0) * 1%), rgba(255,255,255,0.08) 0);
        -webkit-mask: radial-gradient(farthest-side, transparent 60%, #000 62%);
        mask: radial-gradient(farthest-side, transparent 60%, #000 62%);
        filter: drop-shadow(0 0 7px var(--rc, #22ffee));
        transition: filter 0.2s;
      }
      .combo-ring-label {
        position: relative; font: 800 26px/1 system-ui, sans-serif;
        color: #fff; text-shadow: 0 2px 6px #000;
      }
      /* ТУРБО — УСКОРЕНИЕ (#19): бак под кольцом, держишь → тратится */
      .od-icon {
        position: absolute; bottom: 4.6%; left: 50%; transform: translateX(-50%);
        z-index: 6; pointer-events: none; white-space: nowrap;
        font: 800 11px/1 system-ui, sans-serif; letter-spacing: 0.06em;
        color: #c8b48a; text-shadow: 0 1px 3px #000; opacity: 0; transition: opacity 0.3s;
      }
      .od-icon.on { opacity: 0.85; }
      .od-icon.hot { color: #ffd24d; text-shadow: 0 0 12px #ffae3c, 0 1px 3px #000;
        animation: od-blink 0.6s ease-in-out infinite alternate; }
      .od-bar {
        position: absolute; bottom: 2.6%; left: 50%; transform: translateX(-50%);
        width: 150px; height: 8px; z-index: 5; pointer-events: none;
        background: rgba(255,255,255,0.12); border-radius: 5px; overflow: hidden;
        border: 1px solid rgba(255,210,90,0.25);
        opacity: 0; transition: opacity 0.3s, box-shadow 0.2s;
      }
      .od-bar.on { opacity: 1; }
      .od-bar.ready { box-shadow: 0 0 16px rgba(255,180,70,0.9); border-color: #ffd24d; }
      .od-bar.active { box-shadow: 0 0 22px rgba(255,140,50,1); border-color: #ff8a3c; }
      .od-bar > div {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #ffd24d, #ff7a3c);
        box-shadow: 0 0 10px #ffb04d; transition: width 0.12s;
      }
      .od-prompt {
        position: absolute; bottom: 13%; left: 50%; transform: translateX(-50%);
        z-index: 6; pointer-events: none; white-space: nowrap;
        color: #ffd24d; font: 800 18px/1 system-ui, sans-serif;
        text-shadow: 0 0 12px #ffae3c, 0 2px 4px #000; opacity: 0;
      }
      .od-prompt.on { opacity: 1; animation: od-blink 0.65s ease-in-out infinite alternate; }
      @keyframes od-blink {
        from { transform: translateX(-50%) scale(1); opacity: 0.7; }
        to { transform: translateX(-50%) scale(1.12); opacity: 1; }
      }
      /* размазывание скорости: гауссов блюр ПО КРАЯМ (центр резкий) — как
         motion blur от разгона. Радиус --tb растёт с интенсивностью турбо. */
      .turbo-fx {
        position: absolute; inset: 0; z-index: 4; pointer-events: none; opacity: 0;
        backdrop-filter: blur(var(--tb, 0px));
        -webkit-backdrop-filter: blur(var(--tb, 0px));
        -webkit-mask: radial-gradient(ellipse 58% 52% at 50% 56%, transparent 26%, #000 92%);
        mask: radial-gradient(ellipse 58% 52% at 50% 56%, transparent 26%, #000 92%);
      }
      /* #45 климакс-переход: полноэкранная вспышка + тройная ударная волна +
         слэм-текст + сабтайтл. Это не «финиш», а хайп-дроп — гоним дальше. */
      .finale-fx { position: absolute; inset: 0; z-index: 7; pointer-events: none; overflow: hidden; }
      /* МЯГКИЙ стык трека: аккуратная надпись сверху, без вуали/вспышки — не рвёт поток */
      .finale-soft {
        position: absolute; left: 0; right: 0; top: 12%; text-align: center;
        z-index: 7; pointer-events: none; animation: finale-soft 2.9s ease-out forwards;
      }
      .finale-soft .t {
        font: 800 clamp(20px, 3.4vw, 38px)/1.1 system-ui, sans-serif; color: #fff;
        text-shadow: 0 0 16px #ffba5a, 0 2px 8px #000; letter-spacing: 0.04em;
      }
      .finale-soft .s {
        margin-top: 0.35rem; font: 700 clamp(13px, 1.9vw, 20px)/1.2 system-ui, sans-serif;
        color: #ffd98a; text-shadow: 0 0 12px #ff9a4c, 0 2px 6px #000; letter-spacing: 0.06em;
      }
      @keyframes finale-soft {
        0% { opacity: 0; transform: translateY(-10px); }
        10% { opacity: 1; transform: translateY(0); }
        75% { opacity: 1; } 100% { opacity: 0; transform: translateY(-6px); }
      }
      .finale-veil {
        position: absolute; inset: 0; background: #fff;
        animation: finale-veil 0.55s ease-out forwards;
      }
      @keyframes finale-veil { 0% { opacity: 0; } 9% { opacity: 0.92; } 100% { opacity: 0; } }
      .finale-flash {
        position: absolute; inset: -15%;
        background: radial-gradient(circle at 50% 50%, rgba(255,248,225,1), rgba(255,190,80,0.7) 30%, rgba(255,140,50,0.25) 52%, transparent 72%);
        animation: finale-flash 1.4s ease-out forwards;
      }
      @keyframes finale-flash {
        0% { opacity: 0; transform: scale(0.5); }
        8% { opacity: 1; } 100% { opacity: 0; transform: scale(1.7); }
      }
      .finale-ring {
        position: absolute; left: 50%; top: 50%; width: 40px; height: 40px; margin: -20px;
        border-radius: 50%; border: 9px solid rgba(255,228,140,0.95);
        box-shadow: 0 0 60px rgba(255,200,80,0.95), inset 0 0 36px rgba(255,210,110,0.7);
        animation: finale-ring 1.1s cubic-bezier(.12,.7,.25,1) forwards; animation-delay: var(--d, 0s);
        opacity: 0;
      }
      @keyframes finale-ring { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(42); opacity: 0; } }
      .finale-text {
        position: absolute; left: 0; right: 0; top: 28%; text-align: center;
        font: 900 clamp(48px, 11vw, 132px)/1 system-ui, sans-serif; color: #fff;
        text-shadow: 0 0 40px #ffae3c, 0 0 90px #ff7a3c, 0 6px 16px #000; letter-spacing: 0.03em;
        animation: finale-text 1.6s cubic-bezier(.2,.85,.25,1) forwards;
      }
      @keyframes finale-text {
        0% { opacity: 0; transform: scale(3); filter: blur(10px); }
        12% { opacity: 1; transform: scale(1); filter: blur(0); }
        70% { opacity: 1; transform: scale(1.06); }
        100% { opacity: 0; transform: scale(1.16); }
      }
      .finale-sub {
        position: absolute; left: 0; right: 0; top: 47%; text-align: center;
        font: 800 clamp(18px, 3.2vw, 34px)/1 system-ui, sans-serif; color: #ffd98a;
        text-shadow: 0 0 18px #ff9a4c, 0 3px 8px #000; letter-spacing: 0.08em;
        animation: finale-sub 1.6s ease-out forwards;
      }
      @keyframes finale-sub {
        0% { opacity: 0; transform: translateY(14px); }
        20% { opacity: 1; transform: translateY(0); }
        72% { opacity: 1; } 100% { opacity: 0; }
      }
      /* края экрана на турбо — золотой пожар, ярче и быстрее fever III */
      .fever-edge.overdrive {
        opacity: 1;
        box-shadow: inset 0 0 80px rgba(255,200,60,0.6), inset 0 0 200px rgba(255,120,40,0.35);
        filter: brightness(1.6) saturate(1.3); animation-duration: 0.22s;
      }
      .menu {
        position: absolute; inset: 0; z-index: 10;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(#101117, #1a1c24);
      }
      .panel {
        border: 1px solid var(--concrete);
        box-shadow: 0 0 24px rgba(0, 0, 0, 0.6);
        background: rgba(20, 21, 27, 0.92);
        padding: 2rem 2.5rem; text-align: center; max-width: 34rem;
      }
      h1 { color: var(--sodium); text-shadow: 0 0 14px rgba(255, 165, 77, 0.5);
        letter-spacing: 0.45em; font-size: 2.4rem; }
      .sub { color: var(--concrete); font-size: 0.8rem; margin-top: 0.3rem; letter-spacing: 0.15em; }
      button {
        margin: 1.2rem 0.4rem 0; padding: 0.7rem 1.6rem; font: inherit; letter-spacing: 0.15em;
        background: transparent; color: var(--sodium);
        border: 1px solid var(--sodium); cursor: pointer;
        text-shadow: 0 0 8px rgba(255, 165, 77, 0.6);
      }
      button:hover { background: rgba(255, 165, 77, 0.12); }
      .simple-panel { text-align: center; position: relative; z-index: 1; }
      /* снег в меню — канвас за панелью */
      .menu-snow {
        position: absolute; inset: 0; z-index: 0; pointer-events: none;
      }
      .presents {
        color: var(--concrete); font-size: 0.85rem; letter-spacing: 0.55em;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
      }
      .title-3d {
        margin: 1.2rem 0 2rem; font-size: 8.5rem; font-weight: 900; font-style: italic;
        letter-spacing: 0.06em; line-height: 1; user-select: none;
        background: linear-gradient(#fdfeff 0%, #c3ccd8 30%, #5a626e 48%, #39404a 52%,
          #aab3bf 60%, #eef2f7 78%, #8d97a4 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        filter:
          drop-shadow(0 2px 0 #2a2e36)
          drop-shadow(0 4px 0 #181b21)
          drop-shadow(0 6px 1px #0a0c10)
          drop-shadow(0 14px 22px rgba(0, 0, 0, 0.85))
          drop-shadow(0 0 34px rgba(255, 165, 77, 0.18));
        transform: perspective(440px) rotateX(16deg);
        animation: title-sway 7s ease-in-out infinite;
      }
      @keyframes title-sway {
        0%, 100% { transform: perspective(440px) rotateX(16deg) rotateY(-7deg); }
        50% { transform: perspective(440px) rotateX(16deg) rotateY(7deg); }
      }
      .play-btn {
        font-size: 1.3rem; padding: 0.9rem 3.4rem; letter-spacing: 0.3em;
        box-shadow: 0 0 18px rgba(255, 165, 77, 0.25);
      }
      .tracks { margin-top: 1.3rem; }
      .track-row {
        display: flex; justify-content: space-between; align-items: baseline; gap: 1rem;
        padding: 0.5rem 0.8rem; margin: 0.35rem 0; cursor: pointer;
        border: 1px solid #3a3d45; text-align: left;
      }
      .track-row:hover { border-color: #6a6d75; }
      .track-row.sel {
        border-color: var(--sodium);
        background: rgba(255, 165, 77, 0.08);
        box-shadow: 0 0 10px rgba(255, 165, 77, 0.25);
      }
      .t-title { color: #fff; font-size: 0.95rem; }
      .t-meta { color: var(--concrete); font-size: 0.75rem; white-space: nowrap; }
      .t-rec { color: #7da37d; margin-left: 0.5rem; }
      .diff-row { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.1rem; }
      .calib-row {
        display: flex; gap: 0.6rem; justify-content: center; align-items: center;
        margin-top: 0.9rem; color: var(--concrete); font-size: 0.75rem;
      }
      .calib-row #cal-val { min-width: 4.5rem; color: #c9ccd2; }
      .vol-row {
        display: flex; gap: 0.8rem; justify-content: center; align-items: center;
        margin-top: 1rem; color: var(--concrete); font-size: 0.8rem;
      }
      .vol-row span { min-width: 5rem; text-align: right; }
      .vol-row input[type="range"] { width: 11rem; accent-color: var(--sodium); }
      button.small { padding: 0.45rem 1rem; font-size: 0.78rem; margin: 0; }
      button.small.sel { background: rgba(255, 165, 77, 0.2); }
      .diff-row + div button#start { margin-top: 1.1rem; }
      .res-score {
        margin-top: 1.2rem; font-size: 3.2rem; color: #fff;
        text-shadow: 0 0 18px var(--sodium);
      }
      .res-stats { margin-top: 0.6rem; color: var(--concrete); font-size: 0.9rem; line-height: 1.6; }
      /* оверлей результатов: сцена видна, клик в любом месте — следующий трек */
      .results-overlay {
        position: absolute; inset: 0; z-index: 8;
        display: flex; flex-direction: column; align-items: center;
        justify-content: flex-start; padding-top: 9vh;
        text-align: center; cursor: pointer;
      }
      .results-overlay > * {
        background: rgba(16, 17, 23, 0.66);
        padding: 0.15rem 1.4rem;
      }
      .res-title {
        color: var(--sodium); font-size: 2rem; letter-spacing: 0.45em;
        text-shadow: 0 0 14px rgba(255, 165, 77, 0.5);
        padding-top: 0.6rem;
      }
      .res-delta { margin-top: 0.4rem; color: var(--sodium); font-size: 1.05rem; }
      .res-delta-up {
        color: #4dffae; text-shadow: 0 0 10px #0fa;
        animation: pop-shake 0.4s ease-in-out;
      }
      /* перерасчёт очков в ноты — прозрачно */
      .res-convert {
        margin-top: 0.7rem; color: #9aa6c0; font-size: 0.92rem; letter-spacing: 0.06em;
      }
      .res-convert::first-line { color: #9aa6c0; }
      /* слот-машина множителя нот */
      .res-slot {
        margin-top: 0.8rem;
        display: flex; align-items: center; gap: 0.8rem;
        border: 1px solid #ffd24d; padding: 0.45rem 1.1rem;
        background: rgba(16, 17, 23, 0.88);
        box-shadow: 0 0 16px rgba(255, 210, 77, 0.3), inset 0 0 14px rgba(0, 0, 0, 0.85);
        transition: box-shadow 0.3s, border-color 0.3s;
      }
      .slot-label { color: #ffd24d; font-size: 1.1rem;
        text-shadow: 0 0 10px rgba(255, 210, 77, 0.5); }
      .slot-window {
        display: block; position: relative;
        width: 4.6rem; height: 38px; overflow: hidden;
        background: #0a0b0f; border: 1px solid #3a3d45;
      }
      /* затемнение кромок окошка — барабан выглядит объёмным */
      .slot-window::before, .slot-window::after {
        content: ''; position: absolute; left: 0; right: 0; height: 10px; z-index: 1;
        pointer-events: none;
      }
      .slot-window::before { top: 0; background: linear-gradient(#0a0b0f, transparent); }
      .slot-window::after { bottom: 0; background: linear-gradient(transparent, #0a0b0f); }
      .slot-reel {
        display: block;
        transition: transform 0.09s linear;
        will-change: transform;
      }
      .slot-cell {
        height: 38px; line-height: 38px; text-align: center;
        font-size: 1.4rem; font-weight: bold; color: #fff;
        text-shadow: 0 0 8px rgba(255, 210, 77, 0.6);
      }
      .slot-total { color: #ffd24d; font-size: 1.05rem; min-width: 1rem;
        text-shadow: 0 0 10px rgba(255, 210, 77, 0.5); }
      .res-slot.slot-win {
        border-color: #4dffae;
        box-shadow: 0 0 26px rgba(77, 255, 174, 0.65), inset 0 0 14px rgba(0, 0, 0, 0.85);
        animation: pop-shake 0.4s ease-in-out;
      }
      .res-slot.slot-win .slot-total, .res-slot.slot-win .slot-cell {
        color: #4dffae; text-shadow: 0 0 12px #0fa;
      }
      /* XP-полоса игрока */
      .res-xp { margin-top: 0.7rem; color: #aef; font-size: 0.9rem;
        display: flex; align-items: center; gap: 0.6rem; justify-content: center; }
      .xp-bar { display: inline-block; width: 12rem; height: 7px;
        background: rgba(255, 255, 255, 0.14); border: 1px solid #2a4a5a; }
      .xp-fill { display: block; height: 100%; width: 0;
        background: linear-gradient(90deg, #22ffee, #3a7bff);
        box-shadow: 0 0 8px #22ffee; transition: width 0.8s ease-out; }
      .res-levelup { margin-top: 0.5rem; color: #ffd24d; font-size: 1.05rem;
        text-shadow: 0 0 12px #fa0; animation: pop-shake 0.5s ease-in-out; }
      /* миссии */
      .res-missions { margin-top: 0.6rem; display: flex; flex-direction: column;
        gap: 0.2rem; font-size: 0.85rem; color: #c9ccd2; }
      .res-mission { display: flex; gap: 0.5rem; justify-content: center; align-items: baseline; }
      .res-mission.just-done { color: #4dffae; text-shadow: 0 0 10px #0fa;
        animation: pop-shake 0.4s ease-in-out; }
      .res-mission .m-prog { color: #8a8d94; font-size: 0.78rem; }
      .res-set { margin-top: 0.45rem; color: #ffd24d; font-size: 0.95rem;
        text-shadow: 0 0 10px #fa0; }
      /* до анлока скина */
      .res-unlock { margin-top: 0.55rem; color: #b9bec6; font-size: 0.82rem; }
      .unlock-bar { margin-top: 0.25rem; width: 13rem; height: 5px; margin-inline: auto;
        background: rgba(255, 255, 255, 0.12); border: 1px solid #3a3d45; }
      .unlock-bar > div { height: 100%; background: linear-gradient(90deg, #b8a060, #ffd24d);
        box-shadow: 0 0 6px #ffd24d; transition: width 0.6s; }
      .res-next { margin-top: 0.9rem; color: #c9ccd2; font-size: 0.95rem; }
      .res-next #cnt { color: var(--sodium); font-size: 1.2rem; }
      .results-overlay button { pointer-events: auto; }
      .res-hint { margin-top: 0.5rem; color: #565963; font-size: 0.72rem; letter-spacing: 0.1em; }
      .rec-glow {
        color: #4dffae !important;
        text-shadow: 0 0 14px #0fa, 0 0 40px #0fa !important;
        animation: pop-shake 0.4s ease-in-out;
      }
      .hint { margin-top: 1.3rem; color: #565963; font-size: 0.72rem; letter-spacing: 0.1em; }
      /* шапка меню: баланс/уровень + кнопка гаража с бейджем капсул */
      .menu-meta { margin-top: 1.4rem; display: flex; align-items: center;
        justify-content: center; gap: 1rem; }
      .menu-bal { color: #ffd24d; font-size: 0.9rem; letter-spacing: 0.12em;
        text-shadow: 0 0 8px rgba(255, 210, 77, 0.4); }
      .cap-badge { background: #ff44ff; color: #fff; border-radius: 50%;
        padding: 0 0.35rem; font-size: 0.7rem; margin-left: 0.3rem;
        box-shadow: 0 0 8px #ff44ff; }
      /* гараж */
      .garage-panel { max-width: 44rem; }
      .garage-stage {
        margin: 0.6rem auto 0.4rem; width: fit-content; line-height: 0;
        border: 1px solid #2a2d35;
        background: radial-gradient(ellipse at 50% 60%, #1c1e26 0%, #0c0d11 75%);
        box-shadow: inset 0 0 40px rgba(0,0,0,0.7);
      }
      .garage-stage canvas { display: block; }
      .cap-btn { font-size: 1rem; padding: 0.7rem 2rem; margin-top: 1rem;
        animation: cap-glow 1.2s ease-in-out infinite alternate; }
      @keyframes cap-glow {
        from { box-shadow: 0 0 12px rgba(255, 68, 255, 0.4); }
        to { box-shadow: 0 0 28px rgba(255, 68, 255, 0.8); }
      }
      .skins-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.7rem;
        margin: 1.3rem 0; }
      .skin-card { border: 1px solid #3a3d45; padding: 0.6rem 0.4rem; cursor: pointer;
        text-align: center; transition: border-color 0.2s, transform 0.1s; }
      .skin-card:hover { border-color: #6a6d75; transform: translateY(-2px); }
      .skin-card.owned { border-color: #5a6d5a; }
      .skin-card.equipped { border-color: var(--sodium);
        box-shadow: 0 0 12px rgba(255, 165, 77, 0.4); }
      .skin-card { border-top: 2px solid var(--rar, #3a3d45); position: relative; }
      .skin-count {
        position: absolute; top: 0.2rem; right: 0.3rem; z-index: 2;
        font-size: 0.72rem; font-weight: bold; color: #ffd24d;
        background: rgba(16,17,23,0.85); padding: 0.05rem 0.3rem; border-radius: 3px;
        text-shadow: 0 0 6px rgba(255,210,77,0.5);
      }
      .skin-swatch { width: 100%; height: 38px; border-radius: 3px; margin-bottom: 0.4rem;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.6); }
      .skin-rarity { font-size: 0.6rem; letter-spacing: 0.15em; margin-bottom: 0.15rem; }
      .skin-name { font-size: 0.72rem; color: #c9ccd2; }
      .skin-act { font-size: 0.7rem; color: var(--sodium); margin-top: 0.3rem; }
      .skin-card.owned:not(.equipped) .skin-act { color: #7da37d; }
      /* вскрытие капсулы */
      .capsule-fx { position: absolute; inset: 0; z-index: 20;
        display: flex; align-items: center; justify-content: center;
        background: rgba(10, 11, 15, 0.82); cursor: pointer; }
      .capsule-box { font-size: 6rem; animation: cap-shake 0.7s ease-in-out; }
      .capsule-box.burst { animation: cap-burst 0.3s ease-out forwards; }
      @keyframes cap-shake {
        0%, 100% { transform: rotate(0); }
        20% { transform: rotate(-12deg) scale(1.05); }
        40% { transform: rotate(12deg) scale(1.1); }
        60% { transform: rotate(-10deg) scale(1.12); }
        80% { transform: rotate(8deg) scale(1.15); }
      }
      @keyframes cap-burst {
        0% { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(2.4); opacity: 0; }
      }
      .capsule-result { text-align: center; line-height: 1.5;
        border: 2px solid #ffd24d; padding: 1.4rem 2.4rem;
        background: rgba(16, 17, 23, 0.9);
        box-shadow: 0 0 30px var(--rar, #ffd24d);
        animation: pop-shake 0.5s ease-in-out; }
      .cap-swatch { width: 7rem; height: 3.4rem; margin: 0 auto 0.7rem; border-radius: 4px;
        box-shadow: inset 0 0 14px rgba(0,0,0,0.6), 0 0 18px var(--rar, #fff); }
      .cap-rarity { font-size: 0.85rem; letter-spacing: 0.3em; }
      .cap-skin-name { font-size: 2rem; font-weight: bold; margin: 0.2rem 0;
        text-shadow: 0 0 16px currentColor; }
      .cap-tag { font-size: 1rem; color: #4dffae; text-shadow: 0 0 10px #0fa; margin-top: 0.3rem; }
      .cap-tag.cap-dupe { color: #ffd24d; text-shadow: 0 0 10px #fa0; }
      .hud {
        position: absolute; top: 1rem; left: 1.2rem; z-index: 5;
        color: #c9ccd2; font-size: 0.9rem; letter-spacing: 0.12em;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
        pointer-events: none;
        transform-origin: left center;
      }
      /* счёт «вздрагивает» на каждый блок — вместо всплывашки в центре экрана */
      .hud.bump { animation: hud-bump 0.18s ease-out; }
      @keyframes hud-bump {
        0% { transform: scale(1); }
        40% { transform: scale(1.14); color: #fff; }
        100% { transform: scale(1); }
      }
      .fx-layer {
        position: absolute; inset: 0; z-index: 6;
        pointer-events: none; overflow: hidden;
      }
      .pop {
        position: absolute; bottom: 36%;
        transform: translateX(-50%) rotate(var(--rot, 0deg));
        font-weight: bold; white-space: nowrap;
        animation: pop-fly 1.05s ease-out forwards;
      }
      .pop-pts {
        color: #aef; font-size: 1.15rem;
        text-shadow: 0 0 8px #2ff, 0 0 18px #2ff;
      }
      .pop-combo {
        color: #ff5cff; font-size: 1.7rem; bottom: 42%;
        text-shadow: 0 0 10px #f0f, 0 0 26px #f0f;
        animation: pop-fly 1.05s ease-out forwards, pop-shake 0.35s ease-in-out;
      }
      .pop-super {
        color: #4dffae; font-size: 2.3rem;
        text-shadow: 0 0 12px #0fa, 0 0 30px #0fa, 0 0 60px #0fa;
      }
      .pop-mega {
        color: #ffd24d; font-size: 3rem;
        text-shadow: 0 0 14px #fa0, 0 0 36px #f50, 0 0 80px #f0f;
      }
      .pop-crash {
        font-size: 2.6rem;
        animation: pop-fly 0.9s ease-out forwards, pop-shake 0.3s ease-in-out 2;
      }
      .pop-mystery {
        color: #fff; font-size: 2.4rem;
        text-shadow: 0 0 10px #fff, 0 0 26px #ff44ff, 0 0 50px #22ffee;
      }
      .pop-perfect {
        color: #ffe9a0; font-size: 1.2rem; bottom: 46%;
        text-shadow: 0 0 8px #fd0, 0 0 18px #fa0; letter-spacing: 0.2em;
      }
      .pop-risk {
        color: #ff8a3d; font-size: 1.5rem;
        text-shadow: 0 0 8px #f60, 0 0 20px #f30;
      }
      .pop-theme {
        color: #c9ccd2; font-size: 1.1rem; bottom: 60%;
        letter-spacing: 0.35em; text-transform: uppercase;
        text-shadow: 0 0 10px rgba(0,0,0,0.9);
      }
      .fs-toast {
        position: absolute; bottom: 1.4rem; left: 50%; transform: translateX(-50%);
        z-index: 12; padding: 0.5rem 1.2rem;
        background: rgba(16, 17, 23, 0.85); border: 1px solid var(--concrete);
        color: #c9ccd2; font-size: 0.8rem; letter-spacing: 0.12em;
        pointer-events: none; opacity: 0; transition: opacity 0.4s;
      }
      .fs-toast.show { opacity: 1; }
      .pop-lost {
        color: #8a8d94; font-size: 1.3rem;
        text-shadow: 0 0 8px #000;
      }
      @keyframes pop-fly {
        0% { opacity: 0; transform: translateX(-50%) rotate(var(--rot)) scale(0.3); }
        18% { opacity: 1; transform: translateX(-50%) rotate(var(--rot)) scale(1.25); }
        32% { transform: translateX(-50%) rotate(var(--rot)) scale(1); }
        100% { opacity: 0; transform: translateX(-50%) rotate(var(--rot)) translateY(-110px) scale(0.95); }
      }
      .flash {
        position: absolute; bottom: 24%; width: 240px; height: 240px;
        transform: translateX(-50%);
        animation: flash-pop 0.28s ease-out forwards;
        pointer-events: none;
      }
      @keyframes flash-pop {
        0% { opacity: 0; transform: translateX(-50%) scale(0.4); }
        25% { opacity: 1; transform: translateX(-50%) scale(1); }
        100% { opacity: 0; transform: translateX(-50%) scale(1.5); }
      }
      @keyframes pop-shake {
        0%, 100% { margin-left: 0; }
        25% { margin-left: -9px; }
        50% { margin-left: 8px; }
        75% { margin-left: -5px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
